image:
  # repository: clockworklabs/spacetime
  repository: morgadoberruezo/spacetimedb
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: traefik
  host: spacetimedb.jamorgado.es
  tls: true
  tlsSecret: spacetimedb-tls
  clusterIssuer: letsencrypt-prod
  
persistence:
  enabled: true
  size: 2Gi

  # docker run --rm --pull always -p 3000:3000 clockworklabs/spacetime start